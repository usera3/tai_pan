server {
    listen 80;
    listen [::]:80;
    server_name cloud.claudcode.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cloud.claudcode.xyz;

    ssl_certificate /etc/letsencrypt/live/cloud.claudcode.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud.claudcode.xyz/privkey.pem;

    client_max_body_size 210m;

    location /_protected_files/ {
        internal;
        alias /home/ubuntu/tai-pan-cloud/data/files/;
    }

    location / {
        proxy_pass http://127.0.0.1:18765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }
}
